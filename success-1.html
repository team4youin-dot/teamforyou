<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Message Sent — TeamForYou</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#080808;color:#f5f5f0;
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }
  .box{max-width:480px;}
  .icon{font-size:64px;margin-bottom:24px;}
  .title{
    font-family:'Bebas Neue',sans-serif;
    font-size:56px;letter-spacing:2px;
    color:#f5f5f0;margin-bottom:12px;
  }
  .title span{color:#c9a84c;}
  .sub{
    font-size:16px;color:rgba(255,255,255,0.5);
    line-height:1.7;font-weight:300;margin-bottom:40px;
  }
  .btn{
    display:inline-block;
    background:#f5f5f0;color:#080808;
    padding:16px 40px;border-radius:100px;
    font-size:14px;font-weight:600;text-decoration:none;
    letter-spacing:0.5px;transition:all 0.3s;
  }
  .btn:hover{background:#c9a84c;}
</style>
</head>
<body>
  <div class="box">
    <div class="icon">✅</div>
    <h1 class="title">Message <span>Sent!</span></h1>
    <p class="sub">Shukriya! Aapka message humein mil gaya.<br/>Hum 24 ghante ke andar aapse contact karenge.</p>
    <a href="/" class="btn">← Wapas Jao</a>
  </div>
</body>
</html>
